<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LightShow Studio — Admin</title>
  <link rel="manifest" href="/admin/manifest.json">
  <meta name="theme-color" content="#e94560">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .container { width: 100%; max-width: 420px; text-align: center; }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 22px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #6666aa; font-size: 13px; margin-bottom: 40px; }
    .cards { display: flex; flex-direction: column; gap: 14px; }
    a.card { display: flex; align-items: center; gap: 16px; background: #12122a; border: 1px solid #2a2a4a; border-radius: 14px; padding: 20px; text-decoration: none; color: #fff; transition: border-color 0.2s, background 0.2s; }
    a.card:hover { border-color: #e94560; background: #1a1a30; }
    .card-icon { font-size: 28px; width: 48px; height: 48px; display: flex; align-items: center; justify-content: center; border-radius: 12px; flex-shrink: 0; }
    .card-icon.dashboard { background: rgba(68, 170, 255, 0.12); }
    .card-icon.chat { background: rgba(233, 69, 96, 0.12); }
    .card-text { text-align: left; }
    .card-title { font-size: 16px; font-weight: 600; margin-bottom: 2px; }
    .card-desc { font-size: 12px; color: #8888aa; }
    .badge { background: #e94560; color: #fff; font-size: 11px; font-weight: 700; padding: 2px 8px; border-radius: 10px; margin-left: auto; display: none; }
  </style>
</head>
<body>
  <div class="container">
    <div class="logo">⚡</div>
    <h1>LightShow Studio</h1>
    <p class="subtitle">Admin Panel</p>
    <div class="cards">
      <a class="card" href="/admin/dashboard">
        <div class="card-icon dashboard">📊</div>
        <div class="card-text">
          <div class="card-title">Dashboard</div>
          <div class="card-desc">AI generations, stats, logs</div>
        </div>
      </a>
      <a class="card" href="/admin/chat">
        <div class="card-icon chat">💬</div>
        <div class="card-text">
          <div class="card-title">Support Chat</div>
          <div class="card-desc">User conversations</div>
        </div>
        <span class="badge" id="chatBadge"></span>
      </a>
    </div>
  </div>
  <script>
    // Check auth
    fetch('/admin/auth-check').then(r => r.json()).then(d => {
      if (!d.authenticated) window.location.href = '/admin/login';
    });
    // Show unread badge
    fetch('/admin/api/chat/conversations').then(r => r.json()).then(d => {
      const total = (d.conversations || []).reduce((sum, c) => sum + (c.unread_admin || 0), 0);
      if (total > 0) {
        const badge = document.getElementById('chatBadge');
        badge.textContent = total;
        badge.style.display = 'inline';
      }
    }).catch(() => {});
  </script>
</body>
</html>
