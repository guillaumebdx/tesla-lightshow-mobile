<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>LightShow Studio — Admin Login</title>
  <link rel="manifest" href="/admin/manifest.json">
  <meta name="theme-color" content="#e94560">
  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }
    body { background: #0a0a1a; color: #fff; font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif; display: flex; justify-content: center; align-items: center; min-height: 100vh; padding: 20px; }
    .card { background: #12122a; border: 1px solid #2a2a4a; border-radius: 16px; padding: 40px 32px; width: 100%; max-width: 380px; text-align: center; }
    .logo { font-size: 48px; margin-bottom: 8px; }
    h1 { font-size: 20px; font-weight: 700; margin-bottom: 4px; }
    .subtitle { color: #6666aa; font-size: 13px; margin-bottom: 32px; }
    input { width: 100%; padding: 14px 16px; border-radius: 10px; border: 1px solid #2a2a4a; background: #0a0a1a; color: #fff; font-size: 15px; outline: none; margin-bottom: 16px; }
    input:focus { border-color: #e94560; }
    button { width: 100%; padding: 14px; border-radius: 10px; border: none; background: #e94560; color: #fff; font-size: 15px; font-weight: 700; cursor: pointer; transition: opacity 0.2s; }
    button:hover { opacity: 0.85; }
    button:disabled { opacity: 0.5; cursor: not-allowed; }
    .error { color: #e94560; font-size: 13px; margin-top: 12px; display: none; }
  </style>
</head>
<body>
  <div class="card">
    <div class="logo">⚡</div>
    <h1>LightShow Studio</h1>
    <p class="subtitle">Admin Panel</p>
    <form id="loginForm">
      <input type="password" id="password" placeholder="Password" autocomplete="current-password" required autofocus>
      <button type="submit" id="btn">Login</button>
    </form>
    <p class="error" id="error">Invalid password</p>
  </div>
  <script>
    // Redirect if already authenticated
    fetch('/admin/auth-check').then(r => r.json()).then(d => {
      if (d.authenticated) window.location.href = '/admin/';
    });

    document.getElementById('loginForm').addEventListener('submit', async (e) => {
      e.preventDefault();
      const btn = document.getElementById('btn');
      const errEl = document.getElementById('error');
      errEl.style.display = 'none';
      btn.disabled = true;
      btn.textContent = '...';
      try {
        const res = await fetch('/admin/login', {
          method: 'POST',
          headers: { 'Content-Type': 'application/json' },
          body: JSON.stringify({ password: document.getElementById('password').value }),
        });
        if (res.ok) {
          window.location.href = '/admin/';
        } else {
          errEl.style.display = 'block';
        }
      } catch {
        errEl.textContent = 'Connection error';
        errEl.style.display = 'block';
      }
      btn.disabled = false;
      btn.textContent = 'Login';
    });
  </script>
</body>
</html>
